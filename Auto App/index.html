<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Canton Auto Sales</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #020617;
      color: #e5e7eb;
    }
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #f9fafb;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px;
    }
    .hero-title {
      font-size: 2.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .hero-subtitle {
      margin-top: 8px;
      font-size: 1rem;
      opacity: 0.95;
    }
    .creator-credit {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.75;
      letter-spacing: 0.03em;
    }
    .btn-inventory {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
    }
    .btn-inventory:hover {
      background: #1d4ed8;
    }
    .contact-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(249,250,251,0.6);
      background: rgba(15,23,42,0.6);
      color: #f9fafb;
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 3;
    }
    .contact-btn:hover {
      background: rgba(15,23,42,0.9);
    }
  </style>
</head>
<body>
  <header class="hero">
    <button class="contact-btn">Contact Us</button>
    <img src="hero.jpg" alt="" class="hero-bg" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">Canton Auto Sales</h1>
      <p class="hero-subtitle">Quality pre-owned vehicles</p>
      <p class="creator-credit">Created by ER</p>
      <a href="inventory.html" class="btn-inventory">View Inventory</a>
    </div>
  </header>
</body>
</html>
