<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Inventory – Canton Auto Sales</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #020617;
      color: #e5e7eb;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .site-title {
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.95rem;
      color: #e5e7eb;
    }
    .contact-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.8);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .contact-btn:hover {
      background: rgba(30,64,175,0.9);
    }
    .nav-links { margin-bottom: 16px; font-size: 0.9rem; }
    .nav-links a { color: #93c5fd; text-decoration: none; margin-right: 16px; }
    .nav-links a:hover { text-decoration: underline; }
    .card {
      background: #020617;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(15,23,42,0.7);
      margin-bottom: 20px;
    }
    label { display: block; margin-top: 8px; font-size: 0.9rem; }
    input, select {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    button {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #1f2937; color: #e5e7eb; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #020617;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 0.9rem;
      vertical-align: middle;
    }
    th { background: #f3f4f6; }
    .actions button { margin-right: 4px; margin-top: 0; padding: 4px 8px; font-size: 0.8rem; }
    #searchBox {
      margin-top: 4px;
      padding: 6px 8px;
      width: 100%;
      max-width: 300px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-available { background: #dcfce7; color: #166534; }
    .badge-sold { background: #fee2e2; color: #991b1b; }
    .photo-cell { min-width: 140px; }
    .photo-wrapper { display: flex; align-items: center; gap: 4px; }
    .photo-wrapper img {
      width: 100px;
      height: 66px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: #e5e7eb;
    }
    .photo-nav-btn { padding: 2px 6px; font-size: 0.75rem; margin-top: 0; }
    .photo-index { font-size: 0.7rem; color: #6b7280; margin-left: 2px; }
    .no-photo { font-size: 0.8rem; color: #9ca3af; }
    .publish-cell { text-align: center; }
    .publish-cell input { width: auto; margin: 0; cursor: pointer; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="site-title">Canton Auto Sales</div>
    <button class="contact-btn">Contact Us</button>
  </div>
  <div class="nav-links">
    <a href="index.html">← Home</a>
    <a href="inventory.html">View public inventory</a>
  </div>

  <div class="card">
    <h2 id="formTitle">Add Vehicle</h2>
    <p style="margin-top:0; color:#6b7280; font-size:0.9rem;">New vehicles are saved as <strong>draft</strong> until you check "Published". Only published cars appear on the customer-facing inventory.</p>
    <form id="carForm">
      <input type="hidden" id="carId" />
      <div class="row">
        <div>
          <label for="make">Make</label>
          <input id="make" required />
        </div>
        <div>
          <label for="model">Model</label>
          <input id="model" required />
        </div>
        <div>
          <label for="year">Year</label>
          <input id="year" type="number" min="1900" max="2100" required />
        </div>
        <div>
          <label for="vin">VIN</label>
          <input id="vin" required />
        </div>
        <div>
          <label for="mileage">Mileage</label>
          <input id="mileage" type="number" min="0" required />
        </div>
        <div>
          <label for="price">Price ($)</label>
          <input id="price" type="number" min="0" step="0.01" required />
        </div>
        <div>
          <label for="status">Status</label>
          <select id="status">
            <option value="available">Available</option>
            <option value="sold">Sold</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="image1">Image 1 (e.g. car1a.jpg)</label>
          <input id="image1" placeholder="car1a.jpg" />
        </div>
        <div>
          <label for="image2">Image 2</label>
          <input id="image2" placeholder="car1b.jpg" />
        </div>
        <div>
          <label for="image3">Image 3</label>
          <input id="image3" placeholder="car1c.jpg" />
        </div>
      </div>
      <button type="submit" class="primary" id="saveButton">Save Vehicle</button>
      <button type="button" class="secondary" id="cancelEditButton" style="display:none;">Cancel Edit</button>
    </form>
  </div>

  <div class="card">
    <h2>All Vehicles (drafts + published)</h2>
    <label for="searchBox">Search (make, model, VIN)</label>
    <input id="searchBox" placeholder="Type to filter..." />

    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Make</th>
          <th>Model</th>
          <th>Year</th>
          <th>VIN</th>
          <th>Mileage</th>
          <th>Price</th>
          <th>Status</th>
          <th>Photos</th>
          <th class="publish-cell">Published</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="inventoryBody"></tbody>
    </table>
  </div>

  <script>
    const STORAGE_KEY = "auto_inventory";
    let inventory = [];
    let nextId = 1;

    const form = document.getElementById("carForm");
    const formTitle = document.getElementById("formTitle");
    const saveButton = document.getElementById("saveButton");
    const cancelEditButton = document.getElementById("cancelEditButton");
    const searchBox = document.getElementById("searchBox");

    const idInput = document.getElementById("carId");
    const makeInput = document.getElementById("make");
    const modelInput = document.getElementById("model");
    const yearInput = document.getElementById("year");
    const vinInput = document.getElementById("vin");
    const mileageInput = document.getElementById("mileage");
    const priceInput = document.getElementById("price");
    const statusInput = document.getElementById("status");
    const image1Input = document.getElementById("image1");
    const image2Input = document.getElementById("image2");
    const image3Input = document.getElementById("image3");
    const tbody = document.getElementById("inventoryBody");

    function loadFromStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          inventory = parsed.map(car => ({
            ...car,
            images: car.images || [],
            published: car.published !== false
          }));
          nextId = inventory.reduce((max, car) => Math.max(max, car.id), 0) + 1;
        }
      } catch (e) {
        console.error("Failed to parse inventory", e);
      }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
    }

    function formatMoney(n) {
      return "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderTable() {
      const filter = searchBox.value.toLowerCase();
      tbody.innerHTML = "";

      const filtered = inventory.filter(car => {
        const text = (car.make + " " + car.model + " " + car.vin).toLowerCase();
        return text.includes(filter);
      });

      if (filtered.length === 0) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = 11;
        cell.textContent = "No vehicles found.";
        row.appendChild(cell);
        tbody.appendChild(row);
        return;
      }

      for (const car of filtered) {
        const row = document.createElement("tr");
        const images = Array.isArray(car.images) ? car.images : [];
        const hasImages = images.length > 0;
        const firstImage = hasImages ? images[0] : "";
        const published = car.published !== false;

        row.innerHTML = `
          <td>${car.make}</td>
          <td>${car.model}</td>
          <td>${car.year}</td>
          <td>${car.vin}</td>
          <td>${Number(car.mileage).toLocaleString()}</td>
          <td>${formatMoney(car.price)}</td>
          <td>
            <span class="badge ${car.status === "available" ? "badge-available" : "badge-sold"}">
              ${car.status === "available" ? "Available" : "Sold"}
            </span>
          </td>
          <td class="photo-cell">
            ${hasImages
              ? `<div class="photo-wrapper">
                   <button type="button" class="photo-nav-btn" onclick="changeImage(${car.id}, -1)">&lt;</button>
                   <img src="${firstImage}" alt="Car photo" id="car-img-${car.id}" data-index="0" />
                   <button type="button" class="photo-nav-btn" onclick="changeImage(${car.id}, 1)">&gt;</button>
                   <span class="photo-index" id="car-img-index-${car.id}">1/${images.length}</span>
                 </div>`
              : `<span class="no-photo">No images</span>`
            }
          </td>
          <td class="publish-cell">
            <input type="checkbox" ${published ? "checked" : ""} onchange="togglePublished(${car.id}, this.checked)" title="Show on public inventory" />
          </td>
          <td class="actions">
            <button type="button" onclick="editCar(${car.id})">Edit</button>
            <button type="button" onclick="deleteCar(${car.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      }
    }

    window.changeImage = function (id, direction) {
      const car = inventory.find(c => c.id === id);
      if (!car || !Array.isArray(car.images) || car.images.length === 0) return;
      const img = document.getElementById("car-img-" + id);
      const indexSpan = document.getElementById("car-img-index-" + id);
      if (!img) return;
      const total = car.images.length;
      let currentIndex = Number(img.dataset.index || 0);
      currentIndex = (currentIndex + direction + total) % total;
      img.src = car.images[currentIndex];
      img.dataset.index = currentIndex;
      if (indexSpan) indexSpan.textContent = (currentIndex + 1) + "/" + total;
    };

    window.togglePublished = function (id, checked) {
      const car = inventory.find(c => c.id === id);
      if (car) {
        car.published = !!checked;
        saveToStorage();
      }
    };

    function clearForm() {
      idInput.value = "";
      form.reset();
      statusInput.value = "available";
      image1Input.value = "";
      image2Input.value = "";
      image3Input.value = "";
      formTitle.textContent = "Add Vehicle";
      saveButton.textContent = "Save Vehicle";
      cancelEditButton.style.display = "none";
    }

    window.editCar = function (id) {
      const car = inventory.find(c => c.id === id);
      if (!car) return;
      idInput.value = car.id;
      makeInput.value = car.make;
      modelInput.value = car.model;
      yearInput.value = car.year;
      vinInput.value = car.vin;
      mileageInput.value = car.mileage;
      priceInput.value = car.price;
      statusInput.value = car.status;
      const imgs = car.images || [];
      image1Input.value = imgs[0] || "";
      image2Input.value = imgs[1] || "";
      image3Input.value = imgs[2] || "";
      formTitle.textContent = "Edit Vehicle";
      saveButton.textContent = "Update Vehicle";
      cancelEditButton.style.display = "inline-block";
    };

    window.deleteCar = function (id) {
      if (!confirm("Delete this vehicle?")) return;
      inventory = inventory.filter(c => c.id !== id);
      saveToStorage();
      renderTable();
      if (String(idInput.value) === String(id)) clearForm();
    };

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const existingId = idInput.value ? Number(idInput.value) : null;
      const images = [image1Input.value.trim(), image2Input.value.trim(), image3Input.value.trim()].filter(Boolean);

      const carData = {
        id: existingId ?? nextId++,
        make: makeInput.value.trim(),
        model: modelInput.value.trim(),
        year: Number(yearInput.value),
        vin: vinInput.value.trim(),
        mileage: Number(mileageInput.value),
        price: Number(priceInput.value),
        status: statusInput.value,
        images,
        published: !!existingId ? (inventory.find(c => c.id === existingId)?.published !== false) : false
      };

      if (existingId) {
        const index = inventory.findIndex(c => c.id === existingId);
        if (index !== -1) inventory[index] = carData;
      } else {
        inventory.push(carData);
      }

      saveToStorage();
      renderTable();
      clearForm();
    });

    cancelEditButton.addEventListener("click", () => clearForm());
    searchBox.addEventListener("input", () => renderTable());

    loadFromStorage();
    renderTable();
  </script>
</body>
</html>
