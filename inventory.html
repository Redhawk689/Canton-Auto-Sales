<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory – Canton Auto Sales</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #020617;
      color: #e5e7eb;
    }
    .nav-links {
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .nav-links a {
      color: #93c5fd;
      text-decoration: none;
      margin-right: 16px;
    }
    .nav-links a:hover { text-decoration: underline; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .site-title {
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.95rem;
      color: #e5e7eb;
    }
    .contact-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.8);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .contact-btn:hover {
      background: rgba(30,64,175,0.9);
    }
    .card {
      background: #020617;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(15,23,42,0.7);
      margin-bottom: 20px;
    }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 8px; font-size: 0.9rem; }
    #searchBox {
      padding: 6px 8px;
      width: 100%;
      max-width: 300px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
    }
    .inventory-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .vehicle-card {
      background: #020617;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 260px;
      margin: 0 auto;
    }
    .vehicle-image-wrapper {
      position: relative;
      width: 100%;
      padding-top: 100%; /* 1:1 square */
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vehicle-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; /* fit inside square without stretching */
    }
    .vehicle-body {
      padding: 12px 16px 16px;
      text-align: center;
    }
    .vehicle-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .vehicle-line {
      font-size: 0.9rem;
      color: #4b5563;
    }
    .vehicle-line + .vehicle-line {
      margin-top: 2px;
    }
    .no-image-box {
      color: #6b7280;
      font-size: 0.9rem;
      text-align: center;
      padding: 8px;
    }
    .image-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }
    .image-nav button {
      padding: 2px 6px;
      font-size: 0.75rem;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: #f3f4f6;
      cursor: pointer;
    }
    .photo-index {
      font-size: 0.75rem;
      color: #6b7280;
    }
    .manage-link { margin-top: 16px; font-size: 0.85rem; color: #6b7280; }
    .manage-link a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="site-title">Canton Auto Sales</div>
    <button class="contact-btn">Contact Us</button>
  </div>
  <div class="nav-links">
    <a href="index.html">← Home</a>
  </div>

  <div class="card">
    <h1>Our Inventory</h1>
    <label for="searchBox">Search (make, model, VIN)</label>
    <input id="searchBox" placeholder="Type to filter..." />

    <div id="cardsContainer" class="inventory-grid"></div>

    <p class="manage-link">Employee? <a href="manage.html">Manage inventory</a></p>
  </div>

  <script>
    const STORAGE_KEY = "auto_inventory";
    let inventory = [];

    const searchBox = document.getElementById("searchBox");
    const cardsContainer = document.getElementById("cardsContainer");

    function loadFromStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          inventory = parsed.map(car => ({
            ...car,
            images: car.images || [],
            published: car.published !== false
          }));
        }
      } catch (e) {
        console.error("Failed to parse inventory", e);
      }
    }

    function formatMoney(n) {
      return "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderCards() {
      const filter = searchBox.value.toLowerCase();
      const published = inventory.filter(car => car.published !== false);
      const filtered = published.filter(car => {
        const text = (car.make + " " + car.model + " " + car.vin).toLowerCase();
        return text.includes(filter);
      });

      cardsContainer.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("p");
        empty.textContent = "No vehicles found.";
        cardsContainer.appendChild(empty);
        return;
      }

      for (const car of filtered) {
        const images = Array.isArray(car.images) ? car.images : [];
        const firstImage = images[0];

        const card = document.createElement("div");
        card.className = "vehicle-card";

        let imageSection;
        if (firstImage) {
          imageSection = `
            <div class="vehicle-image-wrapper">
              <img src="${firstImage}" alt="${car.year} ${car.make} ${car.model}" class="vehicle-image" id="car-img-${car.id}" data-index="0" />
            </div>
            <div class="image-nav">
              <button type="button" onclick="changeImage(${car.id}, -1)">&lt;</button>
              <span class="photo-index" id="car-img-index-${car.id}">1/${images.length}</span>
              <button type="button" onclick="changeImage(${car.id}, 1)">&gt;</button>
            </div>
          `;
        } else {
          imageSection = `
            <div class="vehicle-image-wrapper">
              <div class="no-image-box">No image available</div>
            </div>
          `;
        }

        card.innerHTML = `
  ${imageSection}
  <div class="vehicle-body">
    <div class="vehicle-title">
      ${car.year} ${car.make} ${car.model} - ${formatMoney(car.price)}
    </div>
    <div class="vehicle-line">VIN: ${car.vin}</div>
    <div class="vehicle-line">Mileage: ${Number(car.mileage).toLocaleString()} miles</div>
    <div class="vehicle-line">Status: ${car.status === "available" ? "Available" : "Sold"}</div>

    <button onclick="buyTestItem()" style="
      margin-top:10px;
      padding:8px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    ">
      Buy $1 Test Item” button
    </button>
  </div>
`;

        cardsContainer.appendChild(card);
      }
    }

    window.changeImage = function (id, direction) {
      const car = inventory.find(c => c.id === id);
      if (!car || !Array.isArray(car.images) || car.images.length === 0) return;
      const img = document.getElementById("car-img-" + id);
      const indexSpan = document.getElementById("car-img-index-" + id);
      if (!img) return;
      const total = car.images.length;
      let currentIndex = Number(img.dataset.index || 0);
      currentIndex = (currentIndex + direction + total) % total;
      img.src = car.images[currentIndex];
      img.dataset.index = currentIndex;
      if (indexSpan) indexSpan.textContent = (currentIndex + 1) + "/" + total;
    };

    searchBox.addEventListener("input", () => renderCards());

    loadFromStorage();
    renderCards();
    async function buyTestItem() {
  try {
    const res = await fetch("/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();
    console.log("Checkout response:", data);

    if (!res.ok) {
      throw new Error(data.error || "Checkout failed");
    }

    if (!data.url) {
      throw new Error("No checkout URL returned");
    }

    window.location.href = data.url;  // 🔥 redirect to Stripe
  } catch (err) {
    console.error("Checkout error:", err);
    alert("Checkout failed: " + err.message);
  }
}

  </script>
</body>
</html>
